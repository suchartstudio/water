<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>แผนที่ระบายน้ำเมืองขอนแก่น</title>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; font-family: 'Chakra Petch', sans-serif; display: flex; height: 100vh; overflow: hidden; background: #f4f4f4;}
        
        /* Sidebar ด้านข้าง */
        #sidebar {
            width: 300px; background: white; box-shadow: 2px 0 5px rgba(0,0,0,0.1);
            display: flex; flex-direction: column; z-index: 1000;
        }
        .sidebar-header { background: #0073e6; color: white; padding: 15px; text-align: center; font-size: 18px; font-weight: bold; }
        .route-list { list-style: none; padding: 0; margin: 0; overflow-y: auto; flex-grow: 1; }
        .route-item { padding: 12px 15px; border-bottom: 1px solid #eee; display: flex; align-items: center; gap: 10px; }
        .route-item .number-badge { 
            background: #333; color: white; width: 28px; height: 28px; 
            display: flex; align-items: center; justify-content: center; 
            border-radius: 50%; font-weight: bold; font-size: 14px; flex-shrink: 0;
        }
        .route-item .route-name { font-size: 15px; color: #333; word-break: break-word; }

        #map { flex-grow: 1; height: 100%; z-index: 1; }
        
        /* CSS สำหรับ Animation และ ป้ายบนแผนที่ */
        .water-flow { stroke-dasharray: 15, 15; animation: flowAnimation 1.5s linear infinite; }
        @keyframes flowAnimation { 100% { stroke-dashoffset: -30; } }
        
        .route-number-label {
            background: white; border: 2px solid #333; border-radius: 50%; color: #333;
            font-family: 'Chakra Petch', sans-serif; font-weight: bold; font-size: 14px;
            width: 24px; height: 24px; text-align: center; line-height: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        /* รองรับหน้าจอมือถือ */
        @media (max-width: 768px) {
            body { flex-direction: column; }
            #sidebar { width: 100%; height: 35vh; box-shadow: 0 -2px 5px rgba(0,0,0,0.1); order: 2; }
            #map { height: 65vh; order: 1; }
        }
    </style>
</head>
<body>

    <div id="sidebar">
        <div class="sidebar-header">เส้นทางระบายน้ำ</div>
        <ul id="routeListUI" class="route-list"></ul>
    </div>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCDqVrQxMbaw_xqHN6MkCaftyLc6RmuSVw",
            authDomain: "maps-2336c.firebaseapp.com",
            projectId: "maps-2336c",
            storageBucket: "maps-2336c.firebasestorage.app",
            messagingSenderId: "1022647480820",
            appId: "1:1022647480820:web:b54dbc3ac910d6cffcc9a1",
            measurementId: "G-PNHR7DVRTS"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const map = L.map('map').setView([16.4322, 102.8236], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(map);

        // เก็บ Layer ไว้เพื่อลบ/อัปเดตแบบ Real-time
        const routeLayers = {};
        const routeListUI = document.getElementById('routeListUI');

        // ดึงข้อมูลเส้นทางน้ำ
        onSnapshot(collection(db, "routes"), (snapshot) => {
            snapshot.docChanges().forEach((change) => {
                const data = change.doc.data();
                const docId = change.doc.id;

                if (change.type === "added" || change.type === "modified") {
                    // หากเป็นการแก้ไข ให้ลบเส้นและเมนูเดิมออกก่อน
                    if (routeLayers[docId]) {
                        map.removeLayer(routeLayers[docId]);
                        document.getElementById(`li-${docId}`)?.remove();
                    }

                    // วาดเส้นลงแผนที่
                    const polyline = L.polyline(data.coordinates, {
                        color: data.color || '#0073e6',
                        weight: data.weight || 4,
                        className: 'water-flow'
                    }).addTo(map);

                    // วางป้ายตัวเลขตรงกึ่งกลางเส้น
                    if(data.coordinates.length > 0 && data.orderNumber) {
                        const midIndex = Math.floor(data.coordinates.length / 2);
                        const midPoint = data.coordinates[midIndex];
                        
                        const numIcon = L.divIcon({
                            className: 'custom-div-icon',
                            html: `<div class="route-number-label" style="border-color:${data.color}">${data.orderNumber}</div>`,
                            iconSize: [28, 28],
                            iconAnchor: [14, 14]
                        });
                        const labelMarker = L.marker(midPoint, { icon: numIcon }).addTo(map);
                        
                        // จับกลุ่มเส้นกับป้ายตัวเลขไว้ด้วยกันเพื่อง่ายต่อการลบ
                        routeLayers[docId] = L.layerGroup([polyline, labelMarker]).addTo(map);
                    } else {
                        routeLayers[docId] = polyline;
                    }

                    // เพิ่มลงใน Sidebar
                    const li = document.createElement('li');
                    li.className = 'route-item';
                    li.id = `li-${docId}`;
                    li.innerHTML = `
                        <div class="number-badge" style="background-color: ${data.color || '#333'}">${data.orderNumber || '-'}</div>
                        <div class="route-name">${data.name || 'ไม่มีชื่อ'}</div>
                    `;
                    // เรียงตามเลข (เรียงง่ายๆ ด้วย order css หรือแทรกตามลำดับ แต่เพื่อความง่ายใส่ไว้ล่างสุด)
                    routeListUI.appendChild(li);

                } else if (change.type === "removed") {
                    if (routeLayers[docId]) map.removeLayer(routeLayers[docId]);
                    document.getElementById(`li-${docId}`)?.remove();
                    delete routeLayers[docId];
                }
            });
        });
        
        // (ส่วนดึงข้อมูล Markers ใช้โค้ดเดิมได้เลย)
    </script>
</body>
</html>
